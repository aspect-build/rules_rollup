# See https://docs.aspect.build/workflows/configuration
workspaces:
    .:
        icon: rollup
        label: rules_rollup
        tasks:
            - workspace:
                  without: true
    e2e/smoke:
        icon: bazel
        tasks:
            - test:
                  queue: aspect-medium
            - buildifier:
                  without: true
            - workspace:
                  queue: aspect-medium
    e2e/smoke_rjs3:
        icon: bazel
        tasks:
            - test:
                  queue: aspect-medium
            - buildifier:
                  without: true
            - workspace:
                  without: true
tasks:
    - checkout:
          update_strategy: rebase
    - test:
          name: Bazel 7
          id: bazel-7
          bazel:
              flags:
                  [
                      '--test_tag_filters=-skip-on-bazel7',
                      '--build_tag_filters=-skip-on-bazel7',
                  ]
          env:
              USE_BAZEL_VERSION: '7.x'
    - test:
          name: Bazel 8
          id: bazel-8
          bazel:
              flags:
                  [
                      '--test_tag_filters=-skip-on-bazel8',
                      '--build_tag_filters=-skip-on-bazel8',
                  ]
          env:
              USE_BAZEL_VERSION: '8.x'
    - test:
          name: Bazel 9
          id: bazel-9
          bazel:
              flags:
                  [
                      '--test_tag_filters=-skip-on-bazel9',
                      '--build_tag_filters=-skip-on-bazel9',
                  ]
          env:
              USE_BAZEL_VERSION: '9.x'
    - test:
          name: WORKSPACE
          id: workspace
          bazel:
              flags:
                  [
                      '--enable_bzlmod=0',
                      '--test_tag_filters=-skip-on-bazel7',
                      '--build_tag_filters=-skip-on-bazel7',
                  ]
          env:
              USE_BAZEL_VERSION: '7.x'
    - buildifier:
          queue: aspect-medium
    - finalization:
          queue: aspect-small
notifications:
    github: {}
